name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile scripts
        run: python -m py_compile scripts/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run benchmark smoke preset
        run: >
          python scripts/run_freightbidbench.py
          --preset smoke
          --seed-count 1
          --label-limit 5
          --eval-load-limit 10
          --cascade-bands 0
          --output-dir benchmark_runs/ci_smoke
